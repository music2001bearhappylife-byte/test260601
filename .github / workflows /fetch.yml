name: Fetch Ondotori Data

on:
  schedule:
    - cron: '*/15 * * * *'
  workflow_dispatch:

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: おんどとりAPIからデータ取得
        run: |
          curl -s -X POST "https://api.webstorage.jp/v1/devices/current" \
            -H "Content-Type: application/json" \
            -H "X-HTTP-Method-Override: GET" \
            -d "{
              \"api-key\":    \"${{ secrets.ONDOTORI_API_KEY }}\",
              \"login-id\":   \"${{ secrets.ONDOTORI_LOGIN_ID }}\",
              \"login-pass\": \"${{ secrets.ONDOTORI_LOGIN_PASS }}\"
            }" > raw.json
          cat raw.json
          python3 -c "
import json, sys, datetime

with open('raw.json') as f:
    raw = json.load(f)

dev      = raw['devices'][0]
channels = dev['channel']
temp     = float(channels[0]['value'])
hum      = float(channels[1]['value'])

try:
    with open('data.json') as f:
        existing = json.load(f)
    history = existing.get('history', [])
