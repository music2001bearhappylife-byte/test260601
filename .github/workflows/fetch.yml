name: Fetch Ondotori Data
on:
  schedule:
    - cron: '*/15 * * * *'
  workflow_dispatch:
jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: fetch
        run: |
          curl -s "https://api.webstorage.jp/v1/devices/current?api-key=${{ secrets.ONDOTORI_API_KEY }}&login-id=${{ secrets.ONDOTORI_LOGIN_ID }}&login-pass=${{ secrets.ONDOTORI_LOGIN_PASS }}" > raw.json
          cat raw.json
          python3 fetch_data.py
      - name: push
        run: |
          git config user.email "bot@github.com"
          git config user.name "GitHub Actions"
          git add data.json
          git diff --cached --quiet || git commit -m "Update sensor data"
          git push
