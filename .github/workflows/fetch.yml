name: Fetch Ondotori Data
on:
  schedule:
    - cron: '*/15 * * * *'
  workflow_dispatch:
jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: fetch
        env:
          API_KEY: ${{ secrets.ONDOTORI_API_KEY }}
          LOGIN_ID: ${{ secrets.ONDOTORI_LOGIN_ID }}
          LOGIN_PASS: ${{ secrets.ONDOTORI_LOGIN_PASS }}
        run: |
          curl -s -X POST \
            -H "Content-Type: application/json" \
            -H "X-HTTP-Method-Override: GET" \
            -d "{\"api-key\":\"${API_KEY}\",\"login-id\":\"${LOGIN_ID}\",\"login-pass\":\"${LOGIN_PASS}\"}" \
            https://api.webstorage.jp:443/v1/devices/current \
            > raw.json
          echo "=== APIの返答 ==="
          cat raw.json
          echo "=== ここまで ==="
