name: Fetch Ondotori Data

on:
  schedule:
    - cron: '*/15 * * * *'
  workflow_dispatch:

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: おんどとりAPIからデータ取得
        env:
          ONDOTORI_API_KEY: ${{ secrets.ONDOTORI_API_KEY }}
          ONDOTORI_LOGIN_ID: ${{ secrets.ONDOTORI_LOGIN_ID }}
          ONDOTORI_LOGIN_PASS: ${{ secrets.ONDOTORI_LOGIN_PASS }}
        run: |
          curl -s -X POST "https://api.webstorage.jp/v1/devices/current" \
            -H "Content-Type: application/json" \
            -H "X-HTTP-Method-Override: GET" \
            -d "{\"api-key\":\"${ONDOTORI_API_KEY}\",\"login-id\":\"${ONDOTORI_LOGIN_ID}\",\"login-pass\":\"${ONDOTORI_LOGIN_PASS}\"}" \
            > raw.json
          cat raw.json
          python3 fetch_data.py

      - name: data.jsonをコミット＆プッシュ
        run: |
          git config user.email "bot@github.com"
          git config user.name "GitHub Actions"
          git add data.json
          git diff --cached --quiet || git commit -m "Update sensor data"
          git push
